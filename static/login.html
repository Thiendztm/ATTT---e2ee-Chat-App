<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Chat</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="auth-container">
        <h1>App Chat</h1>
        <p>Mã hóa đầu cuối</p>
        
        <div class="error-message" id="authError"></div>
        <div class="success-message" id="successMessage"></div>
        
        <div class="form-group">
            <label>Username:</label>
            <input type="text" id="usernameInput" placeholder="Enter username" onkeypress="if(event.key==='Enter') handleRegister()">
        </div>
        
        <div class="form-group">
            <label>Password:</label>
            <input type="password" id="passwordInput" placeholder="Enter password" onkeypress="if(event.key==='Enter') handleLogin()">
        </div>
        
        <div class="button-group">
            <button class="btn-primary" onclick="handleRegister()">Register</button>
            <button class="btn-secondary" onclick="handleLogin()">Login</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
