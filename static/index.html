<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Chat</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body> 
    <div id="chatScreen">
        <div class="sidebar">
            <div class="sidebar-header">Người dùng</div>
            <div class="user-info" id="userInfo"></div>
            <div class="user-list" id="userList">
                <div class="placeholder">Đang tải...</div>
            </div>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>

        <div class="main-content">
            <div class="chat-header">
                <h2 id="chatTitle">Bắt đầu cuộc trò chuyện</h2>
                <div class="key-status unsecured" id="keyStatus">
                    <span class="status-dot red"></span>
                    <span>Chưa bảo mật</span>
                </div>
            </div>

            <div class="messages" id="messages">
                <div class="no-user-selected">Chọn một người để bắt đầu chat</div>
            </div>

            <div class="input-area" id="inputArea" style="display: none;">
                <input type="text" id="messageInput" placeholder="Nhập tin nhắn... (Enter để gửi)">
                <button onclick="handleSendMessage()">Gửi</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/crypto.js"></script>
    <script src="/js/chat.js"></script>
</body>
</html>
