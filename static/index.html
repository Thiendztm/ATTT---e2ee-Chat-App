<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E2EE Chat - Mã hóa đầu cuối</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- AUTH SCREEN -->
    <div id="authScreen">
        <div class="auth-container">
            <h1>🔐 E2EE Chat</h1>
            <div class="error-message" id="authError"></div>
            
            <div class="form-group">
                <label>Tên đăng nhập:</label>
                <input type="text" id="usernameInput" placeholder="Nhập tên đăng nhập">
            </div>
            
            <div class="form-group">
                <label>Mật khẩu:</label>
                <input type="password" id="passwordInput" placeholder="Nhập mật khẩu">
            </div>
            
            <div class="button-group">
                <button class="btn-primary" onclick="handleRegister()">Đăng ký</button>
                <button class="btn-secondary" onclick="handleLogin()">Đăng nhập</button>
            </div>
        </div>
    </div>

    <!-- CHAT SCREEN -->
    <div id="chatScreen">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-header">💬 Người dùng</div>
            <div class="user-info" id="userInfo"></div>
            <div class="user-list" id="userList">
                <div class="placeholder">Đang tải...</div>
            </div>
            <button class="logout-btn" onclick="handleLogout()">🚪 Đăng xuất</button>
        </div>

        <!-- MAIN CHAT AREA -->
        <div class="main-content">
            <div class="chat-header">
                <h2 id="chatTitle">Chọn người để chat</h2>
                <div class="key-status unsecured" id="keyStatus">
                    <span class="status-dot red"></span>
                    <span>Chưa bảo mật</span>
                </div>
            </div>

            <div class="messages" id="messages">
                <div class="no-user-selected">Chọn một người để bắt đầu chat</div>
            </div>

            <div class="input-area" id="inputArea" style="display: none;">
                <input type="text" id="messageInput" placeholder="Nhập tin nhắn... (Enter để gửi)">
                <button onclick="handleSendMessage()">Gửi</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/crypto.js"></script>
    <script src="/js/chat.js"></script>
</body>
</html>
